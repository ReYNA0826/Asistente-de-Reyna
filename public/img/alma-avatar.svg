<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 320" width="430" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8edf5"/>
      <stop offset="50%" style="stop-color:#dce3ed"/>
      <stop offset="100%" style="stop-color:#c5cdd8"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d0b8"/>
      <stop offset="100%" style="stop-color:#e8c0a8"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2818"/>
      <stop offset="100%" style="stop-color:#2a1a0f"/>
    </linearGradient>
    <linearGradient id="blazer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#152d4a"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    <radialGradient id="office" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#d4dce8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#b0bcc8;stop-opacity:0.5"/>
    </radialGradient>
  </defs>

  <!-- Background - office feel -->
  <rect width="430" height="320" fill="url(#bg)"/>

  <!-- Subtle office elements -->
  <rect x="320" y="20" width="80" height="120" rx="4" fill="#c8d2de" opacity="0.3"/>
  <rect x="330" y="30" width="60" height="40" rx="2" fill="#b8c4d2" opacity="0.3"/>
  <rect x="30" y="40" width="60" height="80" rx="4" fill="#c8d2de" opacity="0.2"/>

  <!-- Body - blazer -->
  <ellipse cx="260" cy="360" rx="120" ry="100" fill="url(#blazer)"/>

  <!-- Shoulders -->
  <path d="M 160 260 Q 180 230 215 225 L 215 260 Z" fill="url(#blazer)"/>
  <path d="M 360 260 Q 340 230 305 225 L 305 260 Z" fill="url(#blazer)"/>

  <!-- Blouse/shirt -->
  <path d="M 230 220 Q 260 240 290 220 L 285 260 Q 260 270 235 260 Z" fill="url(#blouse)"/>

  <!-- Neck -->
  <rect x="245" y="195" width="30" height="30" rx="6" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="260" cy="160" rx="55" ry="65" fill="url(#skin)"/>

  <!-- Hair - dark brown, professional -->
  <path d="M 205 150 Q 205 90 260 80 Q 315 90 315 150 Q 315 120 300 110 Q 280 95 240 95 Q 220 100 210 115 Q 205 130 205 150" fill="url(#hair)"/>

  <!-- Hair sides -->
  <path d="M 205 150 Q 200 170 198 200 Q 195 220 200 240 Q 202 220 205 200 Q 208 180 210 165 Z" fill="url(#hair)"/>
  <path d="M 315 150 Q 320 170 322 200 Q 325 220 320 240 Q 318 220 315 200 Q 312 180 310 165 Z" fill="url(#hair)"/>

  <!-- Eyes -->
  <ellipse cx="243" cy="155" rx="8" ry="5" fill="white"/>
  <ellipse cx="277" cy="155" rx="8" ry="5" fill="white"/>
  <circle cx="244" cy="155" r="3.5" fill="#4a3520"/>
  <circle cx="278" cy="155" r="3.5" fill="#4a3520"/>
  <circle cx="245" cy="154" r="1.2" fill="white"/>
  <circle cx="279" cy="154" r="1.2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M 233 146 Q 243 142 253 145" stroke="#5a4030" stroke-width="1.5" fill="none"/>
  <path d="M 267 145 Q 277 142 287 146" stroke="#5a4030" stroke-width="1.5" fill="none"/>

  <!-- Nose -->
  <path d="M 260 158 Q 257 168 255 170 Q 260 172 265 170 Q 263 168 260 158" fill="#deb8a0" opacity="0.6"/>

  <!-- Smile -->
  <path d="M 245 180 Q 260 190 275 180" stroke="#c0907a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Lips -->
  <path d="M 248 180 Q 260 187 272 180 Q 260 184 248 180" fill="#d4908a"/>
</svg>
